<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="골골골">

<title>골골골</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#ffffff; --text:#1d1d1f; --muted:#9b9aa0; --line:#eeeeee;
    --accent:#E8995A;
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",system-ui,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overflow:hidden; overscroll-behavior:none;}
  body{
    font-family:var(--font); color:var(--text); background:var(--bg);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; touch-action:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px 22px calc(96px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }

  .wrap{width:100%; max-width:440px; display:flex; flex-direction:column; align-items:center;}

  .title{font-size:23px; font-weight:700; letter-spacing:.18em; padding-left:.18em;}
  .tag{margin-top:9px; font-size:10.5px; font-weight:600; letter-spacing:.36em;
    color:var(--muted); text-transform:uppercase;}

  .stage{position:relative; width:100%; display:flex; align-items:center; justify-content:center;
    margin:34px 0 26px; min-height:160px;}
  .glow{position:absolute; left:50%; top:50%; width:94%; height:94%;
    transform:translate(-50%,-50%); border-radius:50%; z-index:0; pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(255,182,132,.92) 0%, rgba(255,168,118,.38) 36%, rgba(255,168,118,0) 67%);
    filter:blur(11px); opacity:0;}
  .cat{position:relative; z-index:1; width:100%; height:auto; display:block;
    transform-origin:50% 66%; will-change:transform;
    filter:drop-shadow(0 18px 24px rgba(40,30,15,.15));}

  .wave{display:flex; align-items:center; justify-content:center; gap:5px; height:22px;}
  .wave i{width:3px; height:20px; border-radius:3px; background:var(--muted);
    transform:scaleY(.14); transform-origin:center; transition:transform .1s linear, background-color .4s; opacity:.85;}
  .wave.on i{background:var(--accent);}

  .caption{margin-top:20px; font-size:13.5px; font-weight:500; letter-spacing:.01em;
    color:var(--muted); text-align:center; min-height:1.4em; transition:color .4s;}
  .caption.on{color:var(--accent); letter-spacing:.06em; animation:fade 1.7s ease-in-out infinite;}
  @keyframes fade{50%{opacity:.5;}}

  .volbar{position:fixed; left:50%; bottom:0; transform:translateX(-50%);
    width:100%; max-width:440px; display:flex; align-items:center; gap:13px;
    padding:18px 28px calc(20px + env(safe-area-inset-bottom));}
  .spk{width:17px; height:17px; stroke:var(--muted); fill:none; stroke-width:1.6; flex:0 0 auto; opacity:.8;}
  input[type=range]{-webkit-appearance:none; appearance:none; flex:1; height:3px; border-radius:3px;
    outline:none; cursor:pointer; background:#e7e7ea; background-repeat:no-repeat;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:14px; height:14px; margin-top:-5.5px;
    border-radius:50%; background:#fff; border:1px solid #d2d2d6; box-shadow:0 1px 3px rgba(0,0,0,.16); cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:14px; height:14px; border:1px solid #d2d2d6; border-radius:50%; background:#fff; cursor:pointer;}

  @media (max-height:560px){ .stage{margin:20px 0 16px; min-height:110px;} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="title">골골골</div>
    <div class="tag">Purr · 골골송</div>

    <div class="stage" id="stage">
      <div class="glow" id="glow"></div>
      <img class="cat" id="cat" alt="잠자는 고양이" draggable="false">

    <div class="wave" id="wave"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>

    <p class="caption" id="caption"></p>

const catEl=document.getElementById('cat');
catEl.src="data:image/webp;base64,"+CAT_B64;

const glow=document.getElementById('glow');
const wave=document.getElementById('wave');
const bars=[...document.querySelectorAll('#wave i')];
const caption=document.getElementById('caption');
const vol=document.getElementById('vol');

const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches || ('ontouchstart' in window);
const INSTRUCTION = isTouch
  ? '꾹 누르거나 살살 쓰다듬어 보세요'
  : '꾹 누르거나 트랙패드를 문질러 보세요 · Space';
caption.textContent = INSTRUCTION;

let ctx,buffer,source,purrGain,master,analyser,dataArr;
let started=false,pressed=false,lastMove=0,curOn=false,purrLevel=0;
function volVal(){ return vol.value/100; }

async function unlockAudio(){
  if(ctx) return;
  const AC=window.AudioContext||window.webkitAudioContext;
  ctx=new AC();
  master=ctx.createGain(); master.gain.value=volVal();
  analyser=ctx.createAnalyser(); analyser.fftSize=1024; dataArr=new Uint8Array(analyser.fftSize);
  purrGain=ctx.createGain(); purrGain.gain.value=0.0001;
  const raw=atob(AUDIO_B64), bytes=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
  try{ buffer=await ctx.decodeAudioData(bytes.buffer.slice(0)); }
  catch(e){ buffer=await new Promise((res,rej)=>ctx.decodeAudioData(bytes.buffer.slice(0),res,rej)); }
  source=ctx.createBufferSource(); source.buffer=buffer; source.loop=true;
  source.connect(purrGain); purrGain.connect(analyser); analyser.connect(master); master.connect(ctx.destination);
  source.start(0); resumeCtx();
}
function resumeCtx(){ if(ctx && ctx.state!=='running') ctx.resume(); }
function firstGesture(){ if(!started) started=true; unlockAudio(); }

vol.addEventListener('input', ()=>{ if(master) master.gain.value=volVal(); paintSlider(); });
function paintSlider(){
  vol.style.backgroundImage='linear-gradient(#bdbdc2,#bdbdc2)';
  vol.style.backgroundSize=vol.value+'% 100%';
}
paintSlider();

function inControls(t){ return t && t.closest && t.closest('.volbar'); }
document.addEventListener('pointerdown', e=>{
  if(inControls(e.target)) return;
  firstGesture(); resumeCtx(); pressed=true; lastMove=performance.now();
  try{ e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId);}catch(_){}
},{passive:true});
document.addEventListener('pointermove', e=>{ if(inControls(e.target)) return; lastMove=performance.now(); },{passive:true});
const release=()=>{ pressed=false; };
document.addEventListener('pointerup',release);
document.addEventListener('pointercancel',release);
window.addEventListener('blur',release);
document.addEventListener('keydown', e=>{ if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); firstGesture(); resumeCtx(); pressed=true; lastMove=performance.now(); }});
document.addEventListener('keyup', e=>{ if(e.code==='Space'||e.code==='Enter'){ pressed=false; }});
document.addEventListener('touchmove', e=>{ if(!inControls(e.target)) e.preventDefault(); },{passive:false});
document.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('dblclick', e=>e.preventDefault());

function applyWant(){
  const now=performance.now();
  const moving=(now-lastMove)<220;
  const on=pressed||moving;
  if(on!==curOn){
    curOn=on;
    if(purrGain){
      const t=ctx.currentTime,g=purrGain.gain;
      g.cancelScheduledValues(t); g.setValueAtTime(Math.max(g.value,0.0001),t);
      if(on) g.linearRampToValueAtTime(1.0,t+0.12);
      else   g.linearRampToValueAtTime(0.0001,t+0.78);
    }
  }
}

function tick(){
  requestAnimationFrame(tick);
  applyWant();
  let level=0;
  if(analyser){
    analyser.getByteTimeDomainData(dataArr);
    let sum=0; for(let i=0;i<dataArr.length;i++){const v=(dataArr[i]-128)/128; sum+=v*v;}
    level=Math.min(1,Math.sqrt(sum/dataArr.length)*3.4);
  }
  purrLevel += (level-purrLevel)*0.15;

  const t=performance.now()/1000;
  const breath=(Math.sin(t*2*Math.PI/4.8)*0.5+0.5);
  const sy=1+breath*0.012+purrLevel*0.04;
  const sx=1+breath*0.008+purrLevel*0.022;
  catEl.style.transform=`scale(${sx.toFixed(4)},${sy.toFixed(4)})`;

  glow.style.opacity=(purrLevel*0.7).toFixed(3);

  const active=curOn||purrLevel>0.14;
  wave.classList.toggle('on',active);
  bars.forEach((b,i)=>{
    const base=active?0.22:0.12;
    const v=Math.max(base, Math.min(1, purrLevel*(0.6+0.6*Math.sin(t*7+i*0.9))+ (active?0.12:0)));
    b.style.transform=`scaleY(${v.toFixed(3)})`;
  });

  if(started){
    caption.textContent = active ? '골골골  골골골  골골골' : INSTRUCTION;
    caption.classList.toggle('on',active);
  }
}
requestAnimationFrame(tick);
</script>
